<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Mental Health Tracker</title>

    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            overflow-x: hidden;
        }

        /* HEADER */
        .header {
            background-color: #EE2F35;
            display: flex;
            align-items: center;
            padding: 20px 60px;
            position: relative;
            z-index: 2;
        }
        .header-title {
            flex: 1;
            text-align: center;
            color: white;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 1.5px;
        }

        .logo img {
            height: 60px;
            width: 60px;
        }
        

        /* HERO SECTION */
        .hero {
            position: relative;
            height: 85vh;
            display: flex;
            align-items: center;
            padding-left: 80px;
            overflow: hidden;
            color: white;
        }

        /* Background Video */
        .hero video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* Dark Overlay */
        .hero::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .hero-content h1 {
            font-size: 52px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero-content p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        /* CTA BUTTON */
        .cta-btn {
            display: inline-block;
            text-decoration: none;
            background-color: #00a6b4;
            color: white;
            padding: 14px 28px;
            border-radius: 25px;
            font-size: 16px;
            transition: 0.3s ease;
        }

        .cta-btn:hover {
            background-color: #008c99;
        }

        /* FOOTER */
        .footer {
            background-color: #EE2F35;
            text-align: center;
            padding: 15px;
            font-size: 14px;
            color: #ffffff;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <img src="mdx.png.png" alt="Middlesex Logo">
        </div>
         <div class="header-title">
        MDX Study Buddy
    </div>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">

        <!-- Background Video -->
        <video autoplay muted loop>
            <source src="supernova.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        
<div class="overlay"></div>
        <div class="hero-content">
            <h1>
                Your intelligent <br>
                study planner</br>
            </h1>

            <p>Helping Middlesex sudents plan smarter, track <br>productivity, and protect their mental wellbeing. </br></p>

            <a href="login.html" class="cta-btn">Get Started</a>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>Contact Us | Terms & Policy</p>
    </footer>

</body>
</html>
